name: Android Build & Firebase Distribution

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for testers"
        required: false
        default: "New build available"

jobs:
  build-and-distribute:
    name: Build APK & Distribute
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Generate native Android project (expo prebuild)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: "1"

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          releaseNotes: ${{ github.event.inputs.release_notes || format('Commit {0} — {1}', github.sha, github.event.head_commit.message) }}
          file: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
